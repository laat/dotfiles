# Prefix
set -g prefix C-b
bind C-b send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -g escape-time 10
set -g detach-on-destroy off
set -g focus-events on
set -g set-clipboard on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features ',*:clipboard'

# Alerts
set -g monitor-activity on
set -g visual-activity off

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation via smart-splits.nvim (alt+hjkl, no prefix needed)
# Bindings are set automatically by the TPM plugin below

# Pane swapping (cmd+ctrl+hjkl via ghostty sending prefix+HJKL)
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Pane resizing (smart-splits.nvim aware)
# Bindings are set automatically by the TPM plugin below

# New window in current path
bind c new-window -c "#{pane_current_path}"

# cmd+number window switching (via ghostty sending ESC+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Nested tmux passthrough
bind -n F12 set prefix None \; set key-table off \; set status-left "#[fg=colour196,bold] OFF " \; display "Outer tmux disabled"
bind -T off F12 set prefix C-b \; set key-table root \; set status-left "" \; display "Outer tmux enabled"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Codespaces picker
bind-key "g" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Codespaces' 'tv gh-codespaces'

# Sesh session picker
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons --hide-attached | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @smart-splits_move_left_key 'M-h'
set -g @smart-splits_move_down_key 'M-j'
set -g @smart-splits_move_up_key 'M-k'
set -g @smart-splits_move_right_key 'M-l'
set -g @smart-splits_resize_left_key 'M-H'
set -g @smart-splits_resize_down_key 'M-J'
set -g @smart-splits_resize_up_key 'M-K'
set -g @smart-splits_resize_right_key 'M-L'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text '%H:%M'

# TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
