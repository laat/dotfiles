[metadata]
name = "gh-codespaces"
description = "Connect to GitHub Codespaces through local and remote tmux"
requirements = ["gh", "tmux", "cs-tmux"]

[source]
command = "cs-tmux list"
display = "{split:\t:1}  {split:\t:2}  {split:\t:3}"
output = "{split:\t:0}"

[preview]
command = "cs-tmux preview '{split:\t:0}'"

[keybindings]
enter = "actions:connect"

[actions.connect]
description = "Connect to codespace in tmux"
command = "cs-tmux connect '{split:\t:0}'"
mode = "execute"
